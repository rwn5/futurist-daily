<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f2eb; color: #0d0d0d; font-family: "Instrument Sans", sans-serif; min-height: 100vh; }
  .masthead { background: #0f0e17; border-bottom: 3px solid #c8392b; padding: 2.5rem 2rem 0; }
  .masthead-inner { max-width: 800px; margin: 0 auto; }
  .eyebrow { font-family: "DM Mono", monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c9943a; margin-bottom: 0.5rem; }
  h1 { font-family: "Fraunces", serif; font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 900; line-height: 0.9; color: #f5f2eb; padding-bottom: 2rem; }
  h1 em { font-style: italic; color: #c9943a; }
  .container { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
  .section-label { font-family: "DM Mono", monospace; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #6b6560; margin-bottom: 1.5rem; }
  .issue { border-bottom: 0.5px solid rgba(13,13,13,0.15); }
  .issue a { display: flex; justify-content: space-between; align-items: center; padding: 1.1rem 0; text-decoration: none; color: #0d0d0d; transition: color 0.15s; }
  .issue a:hover { color: #c8392b; }
  .issue-date { font-family: "Fraunces", serif; font-size: 1.1rem; font-weight: 700; }
  .issue-arrow { font-family: "DM Mono", monospace; font-size: 0.8rem; color: #6b6560; }
  .issue a:hover .issue-arrow { color: #c8392b; }
</style>
</head>
